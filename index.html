<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mi Animeteca</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=IBM+Plex+Mono:wght@400;600;700&family=Inter:wght@400;500;600&display=swap" rel="stylesheet">

<link rel="stylesheet" href="style.css">
</head>
<body>

<div class="app">

  <!-- Encabezado: título de la app y contador de títulos guardados -->
  <div class="header">
    <div class="title-block">
      <h1>MI ANIMETECA</h1>
      <div class="sub">Catálogo personal · lo que ya viste, ordenado y calificado</div>
    </div>
    <div class="count-badge" id="countBadge">
      <b id="countNum">0</b>
      títulos archivados
    </div>
  </div>

  <!-- Pestañas de nivel superior: la colección normal, o el panel de estadísticas -->
  <div class="page-tabs" id="pageTabs">
    <button class="page-tab active" data-page="collection">Colección</button>
    <button class="page-tab" data-page="stats">📊 Estadísticas</button>
  </div>

  <div id="collectionView">

  <!-- Pestañas para elegir cómo agregar un anime: por búsqueda o a mano -->
  <div class="add-mode-row">
    <button class="mode-tab active" id="tabSearch">Buscar anime</button>
    <button class="mode-tab" id="tabManual">Agregar manualmente</button>
  </div>

  <!-- Modo "Buscar anime": caja de búsqueda (AniList) + resultados -->
  <div class="search-box" id="searchBox">
    <input id="searchInput" type="text" placeholder="Buscar un anime para añadirlo (ej: Fullmetal Alchemist)" />
    <button id="searchBtn">Buscar</button>
  </div>
  <div class="search-status" id="searchStatus" style="display:none;"></div>
  <div class="results" id="results"></div><!-- aquí se insertan las tarjetas de resultados al buscar -->

  <!-- Modo "Agregar manualmente": formulario completo sin depender de internet -->
  <div class="manual-form" id="manualForm">
    <div class="manual-grid">
      <div>
        <img id="manualPreview" class="manual-preview" src="" alt="" style="display:none;">
        <div class="file-row">
          <label style="margin-top:10px;">Subir imagen desde tu dispositivo</label>
          <input type="file" id="manualFile" accept="image/*">
        </div>
      </div>
      <div>
        <div class="field">
          <label>Título *</label>
          <input type="text" id="manualTitle" placeholder="Nombre del anime">
        </div>
        <div class="field">
          <label>URL de imagen (opcional si subiste un archivo)</label>
          <input type="url" id="manualImageUrl" placeholder="https://...">
        </div>
        <div class="field">
          <label>Género(s) — separados por coma</label>
          <input type="text" id="manualGenres" placeholder="Acción, Aventura, Fantasía">
        </div>
        <div class="manual-two-col">
          <div class="field">
            <label>Tipo</label>
            <select id="manualType"></select><!-- opciones cargadas por JS: typeOptionsHtml() -->
          </div>
          <div class="field">
            <label>Año de emisión</label>
            <input type="text" inputmode="numeric" id="manualYear" placeholder="2024">
          </div>
        </div>
        <div class="manual-two-col">
          <div class="field">
            <label>Episodios</label>
            <input type="text" inputmode="numeric" id="manualEpisodes" placeholder="12">
          </div>
          <div class="field">
            <label>Temporada</label>
            <select id="manualSeasonNumber"></select><!-- opciones cargadas por JS: seasonOptionsHtml() -->
          </div>
        </div>
        <div class="manual-two-col">
          <div class="field">
            <label>Calificación (opcional)</label>
            <select id="manualRating"></select><!-- opciones cargadas por JS: ratingOptionsHtml() -->
          </div>
          <div class="field">
            <label>Estado</label>
            <select id="manualWatchStatus"></select><!-- opciones cargadas por JS: watchStatusOptionsHtml() -->
          </div>
        </div>
        <div class="field">
          <label>Sinopsis</label>
          <textarea id="manualSynopsis" placeholder="Breve descripción del anime..."></textarea>
        </div>
        <div class="manual-actions">
          <button class="btn-primary" id="manualSubmit">Añadir a mi animeteca</button>
          <button class="btn-ghost" id="manualCancel">Cancelar</button>
        </div>
      </div>
    </div>
  </div>

  <!-- "Mis Listas": filtra la colección por estado de visto -->
  <div class="watch-tabs-heading">Mis Listas</div>
  <div class="watch-tabs" id="watchTabs">
    <button class="watch-tab active" data-status="todo">Todo</button>
    <button class="watch-tab" data-status="viendo">Viendo</button>
    <button class="watch-tab" data-status="por-ver">Por Ver</button>
    <button class="watch-tab" data-status="completado">Completado</button>
    <button class="watch-tab" data-status="pausado">Pausado</button>
    <button class="watch-tab" data-status="descartado">Descartado</button>
  </div>

  <!-- Fila 1: orden de la colección (izquierda) y tamaño de miniatura (derecha) -->
  <div class="controls controls-spread">
    <div class="sort-group" id="sortGroup"><!-- orden: alfabético / calificación / recientes -->
      <button class="sort-btn active" data-sort="alpha">A – Z</button>
      <button class="sort-btn" data-sort="rating">Mejor valorados</button>
      <button class="sort-btn" data-sort="recent">Añadidos recientemente</button>
    </div>
    <div class="view-group" id="viewGroup"><!-- tamaño de miniatura: grande / mediana / pequeña -->
      <button class="view-btn active" data-view="large" title="Miniatura grande">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="8" height="8" rx="1"/><rect x="13" y="3" width="8" height="8" rx="1"/><rect x="3" y="13" width="8" height="8" rx="1"/><rect x="13" y="13" width="8" height="8" rx="1"/></svg>
      </button>
      <button class="view-btn" data-view="medium" title="Miniatura mediana">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="2" width="6" height="6" rx="1"/><rect x="9" y="2" width="6" height="6" rx="1"/><rect x="16" y="2" width="6" height="6" rx="1"/><rect x="2" y="9" width="6" height="6" rx="1"/><rect x="9" y="9" width="6" height="6" rx="1"/><rect x="16" y="9" width="6" height="6" rx="1"/><rect x="2" y="16" width="6" height="6" rx="1"/><rect x="9" y="16" width="6" height="6" rx="1"/><rect x="16" y="16" width="6" height="6" rx="1"/></svg>
      </button>
      <button class="view-btn" data-view="small" title="Miniatura pequeña">
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="1" y="1" width="4" height="4"/><rect x="7" y="1" width="4" height="4"/><rect x="13" y="1" width="4" height="4"/><rect x="19" y="1" width="4" height="4"/><rect x="1" y="7" width="4" height="4"/><rect x="7" y="7" width="4" height="4"/><rect x="13" y="7" width="4" height="4"/><rect x="19" y="7" width="4" height="4"/><rect x="1" y="13" width="4" height="4"/><rect x="7" y="13" width="4" height="4"/><rect x="13" y="13" width="4" height="4"/><rect x="19" y="13" width="4" height="4"/></svg>
      </button>
    </div>
  </div>

  <!-- Fila 2: enviar / exportar / importar respaldo de la colección -->
  <div class="controls">
    <div class="backup-group">
      <button class="backup-btn" id="shareBtn">Enviar por correo / Drive</button>
      <button class="backup-btn" id="exportBtn">Exportar respaldo (.json)</button>
      <button class="backup-btn" id="exportTxtBtn">Exportar lista (.txt)</button>
      <button class="backup-btn" id="importBtn">Importar respaldo</button>
      <input type="file" id="importFile" accept="application/json" style="display:none;">
    </div>
  </div>

  <!-- Fila 3: buscador discreto de tu colección junto al filtro por género (píldora) -->
  <div class="controls">
    <div class="library-search"><!-- buscador discreto dentro de tu colección -->
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="7"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
      <input type="text" id="librarySearchInput" placeholder="Buscar en tu lista…">
    </div>
    <div class="filter-group">
      <select id="genreFilter">
        <option value="all">Todos los géneros</option>
      </select>
      <svg class="filter-chevron" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5"><polyline points="6 9 12 15 18 9"/></svg>
    </div>
  </div>

  <div class="rail" id="rail"></div><!-- índice alfabético A-Z, solo visible con orden "A-Z" -->

  <div id="listArea"></div><!-- aquí se dibuja toda la cuadrícula de tarjetas (función render()) -->

  </div><!-- fin de #collectionView -->

  <div id="statsView" style="display:none;"></div><!-- panel de estadísticas, se llena con renderStats() -->

</div>

<!-- Modal reutilizable: detalle/edición de un anime YA agregado, y también
     el panel de confirmación (tipo/temporada/calificación) al agregar uno nuevo -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal-card">
    <button class="modal-close" id="modalClose">&times;</button>
    <div id="modalContent"></div><!-- contenido dinámico: ver renderModalView/renderModalEdit/renderAddPanel -->
  </div>
</div>

<script>
(function(){
  const STORAGE_KEY = 'lista-anime';
  let animeList = [];
  let currentSort = 'alpha';
  let currentGenre = 'all';
  let currentWatchStatus = 'todo';
  let currentView = localStorage.getItem('vista-animeteca') || 'large';
  let libraryQuery = '';
  let loaded = false;

  const el = {
    input: document.getElementById('searchInput'),
    searchBtn: document.getElementById('searchBtn'),
    results: document.getElementById('results'),
    searchStatus: document.getElementById('searchStatus'),
    listArea: document.getElementById('listArea'),
    countNum: document.getElementById('countNum'),
    rail: document.getElementById('rail'),
    sortGroup: document.getElementById('sortGroup'),
    genreFilter: document.getElementById('genreFilter'),
    viewGroup: document.getElementById('viewGroup'),
    librarySearchInput: document.getElementById('librarySearchInput'),
    shareBtn: document.getElementById('shareBtn'),
    exportBtn: document.getElementById('exportBtn'),
    exportTxtBtn: document.getElementById('exportTxtBtn'),
    importBtn: document.getElementById('importBtn'),
    importFile: document.getElementById('importFile'),
    tabSearch: document.getElementById('tabSearch'),
    tabManual: document.getElementById('tabManual'),
    searchBox: document.getElementById('searchBox'),
    manualForm: document.getElementById('manualForm'),
    manualPreview: document.getElementById('manualPreview'),
    manualFile: document.getElementById('manualFile'),
    manualTitle: document.getElementById('manualTitle'),
    manualImageUrl: document.getElementById('manualImageUrl'),
    manualGenres: document.getElementById('manualGenres'),
    manualType: document.getElementById('manualType'),
    manualYear: document.getElementById('manualYear'),
    manualEpisodes: document.getElementById('manualEpisodes'),
    manualSeasonNumber: document.getElementById('manualSeasonNumber'),
    manualRating: document.getElementById('manualRating'),
    manualWatchStatus: document.getElementById('manualWatchStatus'),
    manualSynopsis: document.getElementById('manualSynopsis'),
    manualSubmit: document.getElementById('manualSubmit'),
    manualCancel: document.getElementById('manualCancel'),
    modalOverlay: document.getElementById('modalOverlay'),
    modalContent: document.getElementById('modalContent'),
    modalClose: document.getElementById('modalClose'),
    watchTabs: document.getElementById('watchTabs'),
    pageTabs: document.getElementById('pageTabs'),
    collectionView: document.getElementById('collectionView'),
    statsView: document.getElementById('statsView'),
  };

  function escapeHtml(str){
    const d = document.createElement('div');
    d.textContent = str == null ? '' : String(str);
    return d.innerHTML;
  }

  function setStatus(msg, isError){
    if(!msg){ el.searchStatus.style.display='none'; return; }
    el.searchStatus.style.display='block';
    el.searchStatus.textContent = msg;
    el.searchStatus.className = 'search-status' + (isError ? ' error' : '');
  }

  // Splits a genre string on comma, semicolon, slash, or a dash surrounded
  // by spaces — covers the different ways people naturally type multiple genres.
  function splitGenres(str){
    return String(str || '')
      .split(/[,;/]+|\s-\s/)
      .map(g => g.trim())
      .filter(Boolean);
  }

  // ---------- Persistence (localStorage: works standalone, in any browser) ----------
  async function loadList(){
    try{
      const raw = localStorage.getItem(STORAGE_KEY);
      animeList = raw ? JSON.parse(raw) : [];
    }catch(e){
      animeList = [];
    }

    // Fix older entries whose genres were saved as a single merged string
    // (e.g. "Acción - Ciencia Ficción - Militar") instead of separate tags.
    let migrated = false;
    animeList.forEach(a => {
      if(Array.isArray(a.genres) && a.genres.length === 1 && /\s-\s|\/|;/.test(a.genres[0])){
        a.genres = splitGenres(a.genres[0]);
        migrated = true;
      }
      // Los animes agregados antes de "Mis Listas" no tenían estado de visto;
      // como la app siempre asumió que lo agregado ya se había visto, ese es el default.
      if(!a.watchStatus){
        a.watchStatus = 'completado';
        migrated = true;
      }
    });
    if(migrated) saveList();

    loaded = true;
    render();

    // Quietly fill in type/año/episodios for older entries added before
    // this data was captured (e.g. anime added via search early on).
    backfillMissingDetails();

    // Traduce al español las sinopsis que quedaron en su idioma original
    // (animes agregados antes de esta función, o si la traducción falló al agregarlos).
    backfillSynopsisTranslation();
  }

  const ANILIST_BY_MAL_ID_QUERY = 'query ($id: Int) { Media(idMal: $id, type: ANIME) { format episodes seasonYear status } }';

  async function backfillMissingDetails(){
    const targets = animeList.filter(a => typeof a.id === 'number' && (!a.type || !a.year || !a.episodes));
    if(targets.length === 0) return;
    let changed = false;
    for(const a of targets){
      try{
        const resp = await fetch('https://graphql.anilist.co', {
          method: 'POST',
          headers: {'Content-Type':'application/json', 'Accept':'application/json'},
          body: JSON.stringify({query: ANILIST_BY_MAL_ID_QUERY, variables: {id: a.id}})
        });
        if(resp.ok){
          const json = await resp.json();
          const d = json && json.data && json.data.Media;
          if(d){
            if(!a.type && d.format){ a.type = d.format; changed = true; }
            if(!a.year && d.seasonYear){ a.year = d.seasonYear; changed = true; }
            if(!a.episodes && d.episodes){ a.episodes = d.episodes; changed = true; }
            if(!a.status && d.status){ a.status = d.status; changed = true; }
          }
        }
      }catch(e){
        // Sin conexión o falló esta consulta puntual: seguimos con el resto en silencio.
      }
      await sleep(900); // ritmo suave para no chocar con el límite de la API pública
    }
    if(changed){
      saveList();
      render();
      if(currentModalId){
        const current = animeList.find(x => x.id === currentModalId);
        if(current) openModal(current.id);
      }
    }
  }

  async function backfillSynopsisTranslation(){
    const targets = animeList.filter(a => !isManualId(a.id) && a.synopsis && !a.synopsisEs);
    if(targets.length === 0) return;
    let changed = false;
    for(const a of targets){
      try{
        const translated = await translateToSpanish(a.synopsis);
        if(translated){
          a.synopsis = translated;
          a.synopsisEs = true;
          changed = true;
        }
      }catch(e){
        // Se reintenta la próxima vez que se abra el archivo.
      }
      await sleep(700);
    }
    if(changed){
      saveList();
      render();
      if(currentModalId){
        const current = animeList.find(x => x.id === currentModalId);
        if(current) openModal(current.id);
      }
    }
  }

  async function saveList(){
    try{
      localStorage.setItem(STORAGE_KEY, JSON.stringify(animeList));
    }catch(e){
      setStatus('No se pudo guardar el cambio en este navegador. Si el almacenamiento está lleno o bloqueado, usa "Exportar respaldo" para no perder tu lista.', true);
    }
  }

  // ---------- Search (AniList GraphQL — más permisivo con CORS que Jikan/MAL,
  // así que funciona mejor al abrir este archivo directamente desde el disco) ----------
  let searching = false;

  function sleep(ms){ return new Promise(res => setTimeout(res, ms)); }

  function stripHtml(str){
    if(!str) return '';
    const div = document.createElement('div');
    div.innerHTML = str;
    return (div.textContent || div.innerText || '').trim();
  }

  // Traduce texto al español usando el endpoint público de Google Translate
  // (sin necesidad de API key). Si falla, quien llame debe capturar el error
  // y quedarse con el texto original.
  async function translateToSpanish(text){
    if(!text) return text;
    const resp = await fetch(
      'https://translate.googleapis.com/translate_a/single?client=gtx&sl=auto&tl=es&dt=t&q=' + encodeURIComponent(text)
    );
    if(!resp.ok) throw new Error('translate-http-' + resp.status);
    const data = await resp.json();
    if(!Array.isArray(data) || !Array.isArray(data[0])) throw new Error('translate-bad-response');
    return data[0].map(segment => segment[0]).join('');
  }

  function isManualId(id){
    return typeof id === 'string' && id.indexOf('m-') === 0;
  }

  const ANILIST_QUERY = 'query ($search: String) { Page(perPage: 8) { media(search: $search, type: ANIME, sort: SEARCH_MATCH) { id title { romaji english } coverImage { large } description(asHtml: false) seasonYear episodes format status genres } } }';

  async function fetchAniList(q, attempt){
    const resp = await fetch('https://graphql.anilist.co', {
      method: 'POST',
      headers: {'Content-Type':'application/json', 'Accept':'application/json'},
      body: JSON.stringify({query: ANILIST_QUERY, variables: {search: q}})
    });
    if(resp.status === 429){
      if(attempt < 2){
        await sleep(1500 * (attempt + 1));
        return fetchAniList(q, attempt + 1);
      }
      throw new Error('rate-limit');
    }
    if(!resp.ok){
      if(attempt < 1){
        await sleep(800);
        return fetchAniList(q, attempt + 1);
      }
      throw new Error('http-' + resp.status);
    }
    const json = await resp.json();
    if(json.errors && json.errors.length){
      throw new Error('api-error');
    }
    return (json.data && json.data.Page && json.data.Page.media) || [];
  }

  async function doSearch(){
    const q = el.input.value.trim();
    if(!q || searching) return;
    if(q.length < 3){
      setStatus('Escribe al menos 3 letras para buscar.', false);
      return;
    }
    searching = true;
    el.searchBtn.disabled = true;
    el.results.innerHTML = '';
    setStatus('Buscando "' + q + '"…', false);

    try{
      const media = await fetchAniList(q, 0);
      if(media.length === 0){
        setStatus('Sin resultados para "' + q + '". Prueba con otro título.', false);
      } else {
        setStatus('', false);
        renderResults(media);
      }
    }catch(e){
      let msg = 'No se pudo buscar en este momento. Inténtalo de nuevo en unos segundos.';
      if(e && e.message === 'rate-limit'){
        msg = 'Se hicieron demasiadas búsquedas seguidas. Espera unos 15-20 segundos y vuelve a intentar.';
      } else if(e instanceof TypeError){
        msg = 'No hay conexión a internet, o algo (antivirus, red corporativa, bloqueador de anuncios) está impidiendo la conexión. Si el problema sigue, usa "Agregar manualmente".';
      }
      setStatus(msg, true);
    }finally{
      searching = false;
      el.searchBtn.disabled = false;
    }
  }

  function renderResults(mediaList){
    el.results.innerHTML = '';
    mediaList.forEach(m => {
      const title = (m.title && (m.title.romaji || m.title.english)) || 'Sin título';
      const img = (m.coverImage && m.coverImage.large) || '';
      const year = m.seasonYear || '—';
      const eps = m.episodes || '?';
      const card = document.createElement('div');
      card.className = 'result-card';
      card.innerHTML =
        '<img src="' + escapeHtml(img) + '" alt="">' +
        '<div>' +
          '<div class="r-title">' + escapeHtml(title) + '</div>' +
          '<div class="r-meta">' + escapeHtml(year) + ' · ' + escapeHtml(eps) + ' eps</div>' +
          '<div class="r-add">+ Añadir a la animeteca</div>' +
        '</div>';
      card.addEventListener('click', () => openAddPanel(m));
      el.results.appendChild(card);
    });
  }

  // ---------- Panel de confirmación al agregar (tipo, temporada y calificación) ----------
  function openAddPanel(m){
    const id = 'al-' + m.id;
    if(animeList.some(a => a.id === id)){
      setStatus('Ese título ya está en tu animeteca.', false);
      return;
    }
    currentModalId = null;
    modalEditing = false;
    m._selectedRating = null;

    renderAddPanel(m, null); // null = sinopsis aún traduciéndose
    el.modalOverlay.classList.add('open');

    const raw = stripHtml(m.description);
    if(raw){
      translateToSpanish(raw)
        .then(t => { m._translatedSynopsis = t; m._synopsisEs = true; renderAddPanel(m, t); })
        .catch(() => { m._translatedSynopsis = raw; m._synopsisEs = false; renderAddPanel(m, raw); });
    } else {
      m._translatedSynopsis = 'Sin sinopsis disponible.';
      m._synopsisEs = false;
    }
  }

  function renderAddPanel(m, synopsisText){
    const title = (m.title && (m.title.romaji || m.title.english)) || 'Sin título';
    const img = (m.coverImage && m.coverImage.large) || '';
    const typeGuess = translateType(m.format) || '';
    const genrePills = (m.genres && m.genres.length)
      ? m.genres.map(g => '<span class="genre-pill">' + escapeHtml(g) + '</span>').join('')
      : '<span class="genre-pill">Sin género</span>';
    const synDisplay = synopsisText === null ? 'Traduciendo sinopsis…' : (synopsisText || 'Sin sinopsis disponible.');

    el.modalContent.innerHTML =
      '<div class="modal-body">' +
        '<img class="modal-poster" src="' + escapeHtml(img) + '" alt="">' +
        '<div>' +
          '<div class="modal-title">' + escapeHtml(title) + '</div>' +
          '<div class="modal-genres">' + genrePills + '</div>' +
          '<div class="modal-synopsis">' + escapeHtml(synDisplay) + '</div>' +
          '<div class="manual-two-col" style="margin-top:6px;">' +
            '<div class="modal-edit-field">' +
              '<label>Tipo</label>' +
              '<select id="addType">' + typeOptionsHtml(typeGuess) + '</select>' +
            '</div>' +
            '<div class="modal-edit-field">' +
              '<label>Temporada</label>' +
              '<select id="addSeasonNumber">' + seasonOptionsHtml('') + '</select>' +
            '</div>' +
          '</div>' +
          '<div class="modal-edit-field">' +
            '<label>Estado</label>' +
            '<select id="addWatchStatus">' + watchStatusOptionsHtml('completado') + '</select>' +
          '</div>' +
        '</div>' +
      '</div>' +
      '<div class="modal-foot" style="flex-direction:column;align-items:stretch;">' +
        '<div>' +
          '<label style="display:block;font-family:\'IBM Plex Mono\',monospace;font-size:10.5px;text-transform:uppercase;letter-spacing:.5px;color:var(--muted);margin-bottom:8px;">Calificación</label>' +
          '<div class="rate-picker" id="addRatingPicker"></div>' +
        '</div>' +
        '<div class="modal-actions" style="justify-content:flex-end;margin-top:16px;">' +
          '<button class="btn-ghost" id="addCancelBtn">Cancelar</button>' +
          '<button class="btn-primary" id="addConfirmBtn">Agregar a mi animeteca</button>' +
        '</div>' +
      '</div>';

    const pickerEl = document.getElementById('addRatingPicker');
    function paintPicker(){
      pickerEl.innerHTML = '';
      pickerEl.appendChild(buildRatingPickerGrid(m._selectedRating, (val) => { m._selectedRating = val; paintPicker(); }));
    }
    paintPicker();

    document.getElementById('addCancelBtn').addEventListener('click', closeModal);
    document.getElementById('addConfirmBtn').addEventListener('click', () => {
      const type = document.getElementById('addType').value || null;
      const seasonNumber = document.getElementById('addSeasonNumber').value
        ? parseInt(document.getElementById('addSeasonNumber').value, 10) : null;
      const watchStatus = document.getElementById('addWatchStatus').value || 'completado';
      finalizeAddAnime(m, type, seasonNumber, watchStatus);
    });
  }

  function finalizeAddAnime(m, type, seasonNumber, watchStatus){
    const id = 'al-' + m.id;
    if(animeList.some(a => a.id === id)){
      setStatus('Ese título ya está en tu animeteca.', false);
      closeModal();
      return;
    }
    const title = (m.title && (m.title.romaji || m.title.english)) || 'Sin título';
    const finalSynopsis = (m._translatedSynopsis !== undefined)
      ? m._translatedSynopsis
      : (stripHtml(m.description) || 'Sin sinopsis disponible.');

    animeList.push({
      id: id,
      title: title,
      image: (m.coverImage && m.coverImage.large) || '',
      synopsis: finalSynopsis,
      synopsisEs: m._synopsisEs || false,
      year: m.seasonYear || null,
      episodes: m.episodes || null,
      type: type,
      status: m.status || null,
      seasonNumber: seasonNumber,
      genres: Array.isArray(m.genres) ? m.genres.slice() : [],
      rating: m._selectedRating || null,
      watchStatus: watchStatus || 'completado',
      addedAt: Date.now()
    });

    el.results.innerHTML = '';
    el.input.value = '';
    saveList();
    render();
    closeModal();
    setStatus('"' + title + '" añadido a tu animeteca.', false);
  }

  function removeAnime(id){
    animeList = animeList.filter(a => a.id !== id);
    saveList();
    render();
  }

  function setRating(id, value){
    const a = animeList.find(a => a.id === id);
    if(a){ a.rating = value; saveList(); render(); if(currentModalId === id) openModal(id); }
  }

  // ---------- Estado de visto ("Mis Listas": Viendo / Por Ver / Completado / Pausado / Descartado) ----------
  const WATCH_STATUSES = [
    {value:'viendo', label:'Viendo'},
    {value:'por-ver', label:'Por Ver'},
    {value:'completado', label:'Completado'},
    {value:'pausado', label:'Pausado'},
    {value:'descartado', label:'Descartado'}
  ];
  function watchStatusLabel(v){
    const found = WATCH_STATUSES.find(w => w.value === v);
    return found ? found.label : 'Completado';
  }
  function watchStatusOptionsHtml(selected){
    return WATCH_STATUSES.map(w =>
      '<option value="' + w.value + '"' + (selected === w.value ? ' selected' : '') + '>' + w.label + '</option>'
    ).join('');
  }

  // ---------- Sistema de calificación (enteros, medios puntos, y una marca
  // especial para lo que está "por encima de un 10") ----------
  const RATING_OPTIONS = [1,1.5,2,2.5,3,3.5,4,4.5,5,5.5,6,6.5,7,7.5,8,8.5,9,9.5,10,11];
  const RATING_SPECIAL = 11; // "más de un 10" — obra maestra
  const RATING_SPECIAL_MARK = '✦';

  function ratingLabel(v){
    return v === RATING_SPECIAL ? RATING_SPECIAL_MARK : String(v);
  }

  function ratingOptionsHtml(selected){
    let html = '<option value="">Sin calificar</option>';
    RATING_OPTIONS.forEach(v => {
      const label = v === RATING_SPECIAL ? RATING_SPECIAL_MARK + ' Obra maestra (más de un 10)' : String(v);
      html += '<option value="' + v + '"' + (String(selected) === String(v) ? ' selected' : '') + '>' + label + '</option>';
    });
    return html;
  }

  function buildRatingPickerGrid(currentValue, onSelect){
    const grid = document.createElement('div');
    grid.className = 'rate-picker';
    RATING_OPTIONS.forEach(v => {
      const b = document.createElement('button');
      b.type = 'button';
      b.textContent = ratingLabel(v);
      if(v === RATING_SPECIAL) b.classList.add('special-option');
      if(currentValue === v) b.classList.add('selected');
      b.addEventListener('click', () => onSelect(v));
      grid.appendChild(b);
    });
    return grid;
  }

  function renderStamp(holder, a){
    holder.innerHTML = '';
    const hasRating = a.rating !== null && a.rating !== undefined;
    const stamp = document.createElement('div');
    stamp.className = 'stamp' + (hasRating ? '' : ' empty') + (a.rating === RATING_SPECIAL ? ' special' : '');
    if(hasRating && a.rating === RATING_SPECIAL){
      stamp.innerHTML = '<div class="num special-num">' + RATING_SPECIAL_MARK + '</div>';
    } else if(hasRating){
      stamp.innerHTML = '<div class="num">' + a.rating + '</div><div class="den">/ 10</div>';
    } else {
      stamp.innerHTML = '<div class="num">Calif.</div>';
    }
    stamp.addEventListener('click', () => {
      holder.innerHTML = '';
      holder.appendChild(buildRatingPickerGrid(a.rating, (v) => setRating(a.id, v)));
    });
    holder.appendChild(stamp);
  }

  // ---------- Label translation helpers ----------
  function translateType(t){
    const map = {
      TV:'TV Anime', Movie:'Película', OVA:'OVA', ONA:'ONA', Special:'Especial', Music:'Música',
      MOVIE:'Película', SPECIAL:'Especial', MUSIC:'Música', TV_SHORT:'TV Anime'
    };
    return t ? (map[t] || t) : null;
  }
  function translateStatus(s){
    const map = {
      'Finished Airing':'Finalizado','Currently Airing':'En emisión','Not yet aired':'Próximamente',
      FINISHED:'Finalizado', RELEASING:'En emisión', NOT_YET_RELEASED:'Próximamente', CANCELLED:'Cancelado', HIATUS:'En pausa'
    };
    return s ? (map[s] || s) : null;
  }
  const SEASON_ORDINALS = ['Primera','Segunda','Tercera','Cuarta','Quinta','Sexta','Séptima','Octava','Novena','Décima'];
  function seasonOrdinalLabel(n){
    const i = parseInt(n, 10);
    return (i >= 1 && i <= SEASON_ORDINALS.length) ? SEASON_ORDINALS[i-1] + ' Temporada' : null;
  }
  function seasonOptionsHtml(selected){
    let html = '<option value="">Sin especificar</option>';
    SEASON_ORDINALS.forEach((label, idx) => {
      const val = idx + 1;
      html += '<option value="' + val + '"' + (String(selected) === String(val) ? ' selected' : '') + '>' + label + '</option>';
    });
    return html;
  }
  function typeOptionsHtml(selected){
    const options = ['TV Anime','OVA','Especial','Película','ONA'];
    let html = '<option value="">Sin especificar</option>';
    options.forEach(opt => {
      html += '<option value="' + opt + '"' + (selected === opt ? ' selected' : '') + '>' + opt + '</option>';
    });
    return html;
  }

  // ---------- Detail / edit modal ----------
  let currentModalId = null;
  let modalEditing = false;

  function openModal(id){
    const a = animeList.find(x => x.id === id);
    if(!a) return;
    currentModalId = id;
    modalEditing = false;
    renderModal(a);
    el.modalOverlay.classList.add('open');
  }

  function closeModal(){
    el.modalOverlay.classList.remove('open');
    currentModalId = null;
    modalEditing = false;
  }

  el.modalClose.addEventListener('click', closeModal);
  el.modalOverlay.addEventListener('click', e => {
    if(e.target === el.modalOverlay) closeModal();
  });

  function renderModal(a){
    if(modalEditing){
      renderModalEdit(a);
    } else {
      renderModalView(a);
    }
  }

  function renderModalView(a){
    const badgeBits = [];
    const type = translateType(a.type);
    const status = translateStatus(a.status);
    const seasonLabel = seasonOrdinalLabel(a.seasonNumber);
    if(type) badgeBits.push(type);
    if(a.year) badgeBits.push(a.year);
    if(seasonLabel) badgeBits.push(seasonLabel);
    if(status) badgeBits.push(status);
    if(a.episodes) badgeBits.push(a.episodes + ' eps');
    badgeBits.push(watchStatusLabel(a.watchStatus));

    const genrePills = (a.genres && a.genres.length)
      ? a.genres.map(g => '<span class="genre-pill">' + escapeHtml(g) + '</span>').join('')
      : '<span class="genre-pill">Sin género</span>';

    el.modalContent.innerHTML =
      '<div class="modal-body">' +
        '<img class="modal-poster" src="' + escapeHtml(a.image) + '" alt="">' +
        '<div>' +
          '<div class="modal-title">' + escapeHtml(a.title) + '</div>' +
          (badgeBits.length ? '<div class="modal-badges">' + escapeHtml(badgeBits.join(' · ')) + '</div>' : '') +
          '<div class="modal-genres">' + genrePills + '</div>' +
          '<div class="modal-synopsis">' + escapeHtml(a.synopsis || 'Sin sinopsis disponible.') + '</div>' +
        '</div>' +
      '</div>' +
      '<div class="modal-foot">' +
        '<div class="modal-rating-block" id="modalRatingBlock"></div>' +
        '<div class="modal-actions">' +
          '<button class="btn-ghost" id="modalEditBtn">Editar</button>' +
          '<button class="btn-ghost" id="modalDeleteBtn" style="color:var(--red);">Quitar del archivo</button>' +
        '</div>' +
      '</div>';

    const ratingBlock = document.getElementById('modalRatingBlock');
    renderStamp(ratingBlock, a);

    document.getElementById('modalEditBtn').addEventListener('click', () => {
      modalEditing = true;
      renderModal(a);
    });
    document.getElementById('modalDeleteBtn').addEventListener('click', () => {
      if(confirm('¿Quitar "' + a.title + '" de tu animeteca? Esta acción no se puede deshacer.')){
        removeAnime(a.id);
        closeModal();
      }
    });
  }

  function renderModalEdit(a){
    el.modalContent.innerHTML =
      '<div class="modal-body">' +
        '<div>' +
          '<img class="modal-poster" id="editPreview" src="' + escapeHtml(a.image) + '" alt="" style="margin-bottom:10px;">' +
          '<div class="modal-edit-field">' +
            '<label>URL de imagen</label>' +

            '<label>O sube una imagen</label>' +

          '</div>' +
        '</div>' +
        '<div>' +

            '<label>Título</label>' +

          '<div class="modal-edit-field">' +

            '</div>' +
          '</div>' +
          '<div class="manual-two-col">' +
            '<div class="modal-edit-field">' +
              '<label>Episodios</label>' +
              '<input type="text" inputmode="numeric" id="editEpisodes" value="' + escapeHtml(a.episodes || '') + '">' +
            '</div>' +
            '<div class="modal-edit-field">' +
              '<label>Temporada</label>' +
              '<select id="editSeasonNumber">' + seasonOptionsHtml(a.seasonNumber || '') + '</select>' +
            '</div>' +
          '</div>' +
          '<div class="modal-edit-field">' +

            '<select id="editWatchStatus">' + watchStatusOptionsHtml(a.watchStatus || 'completado') + '</select>' +

      saveList();
      render();
      modalEditing = false;
      renderModal(a);
    });
  }

  // ---------- Rendering the collection ----------
  function groupByLetter(list){
    const groups = {};
    list.forEach(a => {
      const letter = (a.title || '?').trim().charAt(0).toUpperCase();
      const key = /[A-Z]/.test(letter) ? letter : '#';
      if(!groups[key]) groups[key] = [];
      groups[key].push(a);
    });
    return groups;
  }

  function makeCard(a, index){
    const card = document.createElement('div');
    card.className = 'card';

    const typeLabel = translateType(a.type);

    card.innerHTML =
      '<div class="poster-wrap">' +
        '<img class="thumb" src="' + escapeHtml(a.image) + '" alt="">' +
        '<div class="stamp-holder"></div>' +
      '</div>' +
      (typeLabel ? '<div class="type-chip">' + escapeHtml(typeLabel) + '</div>' : '') +
      '<div class="card-title">' + escapeHtml(a.title) + '</div>';

    // stamp / rating (overlaid on the poster, doesn't trigger the modal)
    const holder = card.querySelector('.stamp-holder');
    holder.addEventListener('click', e => e.stopPropagation());
    renderStamp(holder, a);

    // clicking anywhere else on the card opens the detail/edit view
    card.addEventListener('click', () => openModal(a.id));

    return card;
  }

  function populateGenreFilter(){
    const genreSet = new Set();
    animeList.forEach(a => (a.genres||[]).forEach(g => genreSet.add(g)));
    const genres = [...genreSet].sort((a,b) => a.localeCompare(b,'es'));
    const prevValue = el.genreFilter.value || 'all';
    el.genreFilter.innerHTML = '<option value="all">Todos los géneros</option>' +
      genres.map(g => '<option value="' + escapeHtml(g) + '">' + escapeHtml(g) + '</option>').join('');
    el.genreFilter.value = genres.includes(prevValue) ? prevValue : 'all';
    currentGenre = el.genreFilter.value;
  }

  function render(){
    el.countNum.textContent = animeList.length;
    el.listArea.innerHTML = '';
    el.rail.innerHTML = '';

    if(!loaded) return;

    populateGenreFilter();

    if(animeList.length === 0){
      el.listArea.innerHTML =
        '<div class="empty-state"><div class="big">TU ANIMETECA ESTÁ VACÍA</div>' +
        'Busca un título arriba para empezar tu colección.</div>';
      return;
    }

    let filtered = animeList.slice();
    if(currentGenre !== 'all'){
      filtered = filtered.filter(a => a.genres && a.genres.includes(currentGenre));
    }
    if(libraryQuery){
      filtered = filtered.filter(a => a.title.toLowerCase().includes(libraryQuery));
    }
    if(currentWatchStatus !== 'todo'){
      filtered = filtered.filter(a => (a.watchStatus || 'completado') === currentWatchStatus);
    }

    if(filtered.length === 0){
      const reason = libraryQuery
        ? 'No hay nada que coincida con "' + escapeHtml(libraryQuery) + '".'
        : 'Prueba con otro filtro o elige "Todos los géneros".';
      el.listArea.innerHTML =
        '<div class="empty-state"><div class="big">SIN RESULTADOS</div>' + reason + '</div>';
      return;
    }

    let sorted = filtered.slice();
    if(currentSort === 'alpha'){
      sorted.sort((a,b) => a.title.localeCompare(b.title, 'es', {sensitivity:'base'}));
    } else if(currentSort === 'rating'){
      sorted.sort((a,b) => (b.rating||0) - (a.rating||0) || a.title.localeCompare(b.title,'es'));
    } else if(currentSort === 'recent'){
      sorted.sort((a,b) => b.addedAt - a.addedAt);
    }

    if(currentSort === 'alpha'){
      const groups = groupByLetter(sorted);
      const letters = Object.keys(groups).sort((a,b) => a.localeCompare(b,'es'));

      // alphabet rail, full A-Z plus # for others
      const fullAlpha = 'ABCDEFGHIJKLMNOPQRSTUVWXYZ'.split('');
      fullAlpha.forEach(L => {
        const a = document.createElement('a');
        a.textContent = L;
        if(groups[L]){
          a.classList.add('has-items');
          a.href = '#letter-' + L;
        } else {
          a.href = 'javascript:void(0)';
        }
        el.rail.appendChild(a);
      });

      let runningIndex = 0;
      letters.forEach(L => {
        const heading = document.createElement('div');
        heading.className = 'letter-heading';
        heading.id = 'letter-' + L;
        heading.textContent = L;
        el.listArea.appendChild(heading);

        const grid = document.createElement('div');
        grid.className = 'grid' + (currentView !== 'large' ? ' size-' + currentView : '');
        groups[L].forEach(a => {
          grid.appendChild(makeCard(a, runningIndex));
          runningIndex++;
        });
        el.listArea.appendChild(grid);
      });
    } else {
      const grid = document.createElement('div');
      grid.className = 'grid' + (currentView !== 'large' ? ' size-' + currentView : '');
      sorted.forEach((a, i) => grid.appendChild(makeCard(a, i)));
      el.listArea.appendChild(grid);
    }
  }

  el.librarySearchInput.addEventListener('input', () => {
    libraryQuery = el.librarySearchInput.value.trim().toLowerCase();
    render();
  });

  el.watchTabs.addEventListener('click', e => {
    const btn = e.target.closest('.watch-tab');
    if(!btn) return;
    currentWatchStatus = btn.dataset.status;
    [...el.watchTabs.children].forEach(b => b.classList.toggle('active', b === btn));
    render();
  });

  el.genreFilter.addEventListener('change', () => {
    currentGenre = el.genreFilter.value;
    render();
  });

  // ---------- Export / Import backup ----------
  function buildBackupBlob(){
    const payload = {
      app: 'mi-animeteca',
      exportedAt: new Date().toISOString(),
      items: animeList
    };
    return new Blob([JSON.stringify(payload, null, 2)], {type:'application/json'});
  }

  function buildTxtReport(){
    const sorted = animeList.slice().sort((a,b) => a.title.localeCompare(b.title, 'es', {sensitivity:'base'}));
    const lines = [
      'MI ANIMETECA — lista de animes vistos',
      'Exportado: ' + new Date().toLocaleString('es'),
      'Total: ' + sorted.length + ' títulos',
      ''.padEnd(50,'-'),
      ''
    ];
    sorted.forEach(a => {
      const genres = (a.genres && a.genres.length) ? a.genres.join(', ') : 'Sin género registrado';
      const rating = a.rating ? a.rating + '/10' : 'Sin calificar';
      lines.push(a.title);
      lines.push('  Género: ' + genres);
      lines.push('  Calificación: ' + rating);
      lines.push('');
    });
    return new Blob([lines.join('\n')], {type:'text/plain'});
  }

  function downloadBlob(blob, filename){
    const url = URL.createObjectURL(blob);
    const a = document.createElement('a');
    a.href = url;
    a.download = filename;
    document.body.appendChild(a);
    a.click();
    document.body.removeChild(a);
    URL.revokeObjectURL(url);
  }

  el.exportBtn.addEventListener('click', () => {
    if(animeList.length === 0){
      setStatus('Tu animeteca está vacía, no hay nada que exportar todavía.', false);
      return;
    }
    const stamp = new Date().toISOString().slice(0,10);
    downloadBlob(buildBackupBlob(), 'animeteca-respaldo-' + stamp + '.json');
    setStatus('Respaldo descargado: guarda ese archivo en un lugar seguro.', false);
  });

  el.exportTxtBtn.addEventListener('click', () => {
    if(animeList.length === 0){
      setStatus('Tu animeteca está vacía, no hay nada que exportar todavía.', false);
      return;
    }
    const stamp = new Date().toISOString().slice(0,10);
    downloadBlob(buildTxtReport(), 'animeteca-lista-' + stamp + '.txt');
    setStatus('Lista descargada en formato de texto.', false);
  });

  el.shareBtn.addEventListener('click', async () => {
    if(animeList.length === 0){
      setStatus('Tu animeteca está vacía, no hay nada que enviar todavía.', false);
      return;
    }
    const stamp = new Date().toISOString().slice(0,10);
    const filename = 'animeteca-respaldo-' + stamp + '.json';
    const blob = buildBackupBlob();

    // Web Share API (funciona en la mayoría de celulares y en Chrome/Edge de escritorio):
    // abre el mismo panel de "Compartir" del sistema, con Gmail, Drive, WhatsApp, etc.
    if(navigator.canShare){
      try{
        const file = new File([blob], filename, {type:'application/json'});
        if(navigator.canShare({files:[file]})){
          await navigator.share({
            files:[file],
            title:'Respaldo de Mi Animeteca',
            text:'Respaldo de mi lista de anime (' + animeList.length + ' títulos).'
          });
          setStatus('Listo, elige a dónde enviarlo desde el panel que se abrió.', false);
          return;
        }
      }catch(e){
        if(e && e.name === 'AbortError'){
          return; // el usuario cerró el panel de compartir, no es un error real
        }
        // si falla, cae al respaldo por mailto abajo
      }
    }

    // Alternativa si el navegador no soporta compartir archivos: abre el correo
    // con un enlace de descarga preparado y el respaldo ya descargado aparte.
    downloadBlob(blob, filename);
    const subject = encodeURIComponent('Respaldo de Mi Animeteca');
    const body = encodeURIComponent(
      'Se descargó el archivo "' + filename + '" en tu carpeta de descargas.\n' +
      'Adjúntalo manualmente a este correo antes de enviarlo (tu navegador no permite adjuntarlo automáticamente).'
    );
    window.location.href = 'mailto:?subject=' + subject + '&body=' + body;
    setStatus('Tu navegador no admite compartir archivos directamente: se descargó el respaldo y se abrió tu correo para que lo adjuntes.', false);
  });

  el.importBtn.addEventListener('click', () => el.importFile.click());

  el.importFile.addEventListener('change', () => {
    const file = el.importFile.files[0];
    if(!file) return;
    const reader = new FileReader();
    reader.onload = () => {
      try{
        const parsed = JSON.parse(reader.result);
        const items = Array.isArray(parsed) ? parsed : (parsed.items || []);
        if(!Array.isArray(items) || items.length === 0){
          setStatus('El archivo no tiene un formato de respaldo válido.', true);
          return;
        }
        let added = 0, skipped = 0;
        items.forEach(item => {
          if(item && typeof item.id !== 'undefined' && item.title){
            if(animeList.some(a => a.id === item.id)){
              skipped++;
            } else {
              animeList.push({
                id: item.id,
                title: item.title,
                image: item.image || '',
                synopsis: item.synopsis || 'Sin sinopsis disponible.',
                year: item.year || null,
                episodes: item.episodes || null,
                type: item.type || null,
                status: item.status || null,
                seasonNumber: item.seasonNumber || null,
                genres: Array.isArray(item.genres) ? item.genres : [],
                rating: item.rating || null,
                watchStatus: item.watchStatus || 'completado',
                addedAt: item.addedAt || Date.now()
              });
              added++;
            }
          }
        });
        saveList();
        render();
        setStatus('Respaldo importado: ' + added + ' añadidos, ' + skipped + ' ya existían.', false);
      }catch(e){
        setStatus('No se pudo leer el archivo. Asegúrate de que sea un respaldo exportado desde aquí.', true);
      }
      el.importFile.value = '';
    };
    reader.readAsText(file);
  });

  [...el.viewGroup.children].forEach(b => b.classList.toggle('active', b.dataset.view === currentView));

  // ---------- Pestañas de nivel superior: Colección / Estadísticas ----------
  el.pageTabs.addEventListener('click', e => {
    const btn = e.target.closest('.page-tab');
    if(!btn) return;
    [...el.pageTabs.children].forEach(b => b.classList.toggle('active', b === btn));
    if(btn.dataset.page === 'stats'){
      el.collectionView.style.display = 'none';
      el.statsView.style.display = 'block';
      renderStats();
    } else {
      el.statsView.style.display = 'none';
      el.collectionView.style.display = 'block';
    }
  });

  // ---------- Panel de estadísticas: calcula todo a partir de animeList ----------
  function computeStats(){
    const total = animeList.length;
    const rated = animeList.filter(a => a.rating !== null && a.rating !== undefined);
    const avgRating = rated.length
      ? (rated.reduce((sum, a) => sum + a.rating, 0) / rated.length)
      : null;
    const masterpieces = animeList.filter(a => a.rating === RATING_SPECIAL).length;
    const totalEpisodes = animeList.reduce((sum, a) => sum + (Number(a.episodes) || 0), 0);

    const byStatus = {};
    WATCH_STATUSES.forEach(w => byStatus[w.value] = 0);
    animeList.forEach(a => {
      const s = a.watchStatus || 'completado';
      byStatus[s] = (byStatus[s] || 0) + 1;
    });

    const genreCount = {};
    animeList.forEach(a => (a.genres || []).forEach(g => { genreCount[g] = (genreCount[g] || 0) + 1; }));
    const topGenres = Object.entries(genreCount).sort((a,b) => b[1] - a[1]).slice(0, 6);

    return {total, avgRating, masterpieces, totalEpisodes, byStatus, topGenres};
  }

  function renderStats(){
    const s = computeStats();

    if(s.total === 0){
      el.statsView.innerHTML =
        '<div class="empty-state"><div class="big">TODAVÍA NO HAY DATOS</div>' +
        'Agrega algunos animes a tu colección y vuelve aquí para ver tus estadísticas.</div>';
      return;
    }

    const statCardsHtml =
      '<div class="stat-cards">' +
        '<div class="stat-card"><div class="stat-num">' + s.total + '</div><div class="stat-label">Animes en tu archivo</div></div>' +
        '<div class="stat-card"><div class="stat-num">' + (s.avgRating !== null ? s.avgRating.toFixed(1) : '—') + '</div><div class="stat-label">Calificación promedio</div></div>' +
        '<div class="stat-card"><div class="stat-num">' + s.totalEpisodes.toLocaleString('es') + '</div><div class="stat-label">Episodios en total</div></div>' +
        '<div class="stat-card"><div class="stat-num">' + s.masterpieces + ' ✦</div><div class="stat-label">Obras maestra</div></div>' +
      '</div>';

    const maxStatus = Math.max(1, ...WATCH_STATUSES.map(w => s.byStatus[w.value]));
    const statusBarsHtml =
      '<div class="stats-block">' +
        '<div class="stats-block-title">Por estado</div>' +
        WATCH_STATUSES.map(w => {
          const count = s.byStatus[w.value];
          const pct = Math.round((count / maxStatus) * 100);
          return '<div class="stat-bar-row">' +
            '<div class="stat-bar-label">' + escapeHtml(w.label) + '</div>' +
            '<div class="stat-bar-track"><div class="stat-bar-fill" style="width:' + pct + '%;"></div></div>' +
            '<div class="stat-bar-count">' + count + '</div>' +
          '</div>';
        }).join('') +
      '</div>';

    const maxGenre = s.topGenres.length ? s.topGenres[0][1] : 1;
    const genresHtml =
      '<div class="stats-block">' +
        '<div class="stats-block-title">Géneros más vistos</div>' +
        (s.topGenres.length
          ? s.topGenres.map(([genre, count]) => {
              const pct = Math.round((count / maxGenre) * 100);
              return '<div class="stat-bar-row">' +
                '<div class="stat-bar-label">' + escapeHtml(genre) + '</div>' +
                '<div class="stat-bar-track"><div class="stat-bar-fill genre-fill" style="width:' + pct + '%;"></div></div>' +
                '<div class="stat-bar-count">' + count + '</div>' +
              '</div>';
            }).join('')
          : '<div class="search-hint">Todavía no hay géneros registrados.</div>')+
      '</div>';

    el.statsView.innerHTML =
      '<div class="stats-heading">Estadísticas de tu animeteca</div>' +
      statCardsHtml +
      '<div class="stats-columns">' + statusBarsHtml + genresHtml + '</div>';
  }

  loadList();
})();
</script>
</body>
</html>
